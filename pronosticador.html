<script>
        // ==================== MENÚ HAMBURGUESA MEJORADO ====================
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    const menuOverlay = document.getElementById('menuOverlay');
    const dropdowns = document.querySelectorAll('.dropdown');

        // Función para cerrar el menú
    function closeMenu() {
        navLinks.classList.remove('active');
        menuOverlay.classList.remove('active');
            document.body.style.overflow = ''; // Restaurar scroll
        }

        // Función para abrir el menú
        function openMenu() {
            navLinks.classList.add('active');
            menuOverlay.classList.add('active');
            document.body.style.overflow = 'hidden'; // Evitar scroll del body
        }

        // Toggle del menú hamburguesa
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (navLinks.classList.contains('active')) {
                closeMenu();
            } else {
                openMenu();
            }
        });

        // Cerrar menú al hacer click en el overlay
        menuOverlay.addEventListener('click', closeMenu);

        // Cerrar menú al hacer click en un enlace
        const allLinks = document.querySelectorAll('.nav-links-premium a');
        allLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth <= 768) {
                    closeMenu();
                }
            });
        });

        // Dropdown en móvil (funciona con click)
        dropdowns.forEach(dropdown => {
            const link = dropdown.querySelector('> a');
            const dropdownMenu = dropdown.querySelector('.dropdown-menu');
            
            if (link && dropdownMenu) {
                link.addEventListener('click', (e) => {
                    if (window.innerWidth <= 768) {
                        e.preventDefault();
                        e.stopPropagation();
                        
                        // Cerrar otros dropdowns abiertos
                        dropdowns.forEach(otherDropdown => {
                            if (otherDropdown !== dropdown && otherDropdown.classList.contains('active')) {
                                otherDropdown.classList.remove('active');
                            }
                        });
                        
                        dropdown.classList.toggle('active');
                    }
                });
            }
        });

        // Back to top
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Cerrar menú si la ventana se redimensiona a desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                closeMenu();
                // Resetear dropdowns en desktop
                dropdowns.forEach(dropdown => {
                    dropdown.classList.remove('active');
                });
            }
        });

        // ==================== PRONOSTICADOR - CON FUNCIÓN ESPECIAL PARA EL 19 ====================
        (function(){
            // Protección contra inspección
            (function(){
                let _a=document;
                let _b=function(e){e.preventDefault();return false;};
                _a.addEventListener('contextmenu',_b);
                _a.addEventListener('selectstart',_b);
                _a.addEventListener('copy',_b);
                _a.addEventListener('cut',_b);
                
                let _c=function(e){
                    let k=e.keyCode;
                    if(k===123||(e.ctrlKey&&e.shiftKey&&k===73)||
                     (e.ctrlKey&&e.shiftKey&&k===74)||(e.ctrlKey&&k===85)||
                     (e.ctrlKey&&k===83)){
                        e.preventDefault();
                    return false;
                }
            };
            _a.addEventListener('keydown',_c);
