name: Actualizar Revistas

on:
  schedule:
    # Se ejecuta a las 10:00 AM, 11:00 AM y 12:00 PM hora de Venezuela (UTC-4)
    - cron: '0 14,15,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          
      - name: Crear carpeta para PDFs si no existe
        run: |
          mkdir -p pdfs
          touch pdfs/.gitkeep

      - name: Descargar PDFs de forma segura
        run: |
          echo "Iniciando descarga de PDFs desde la fuente principal..."
          
          # Limpiamos los PDFs viejos para asegurar que si la fuente no actualizó, no mostremos contenido viejo
          rm -f pdfs/*.pdf
          touch pdfs/.gitkeep

          # Leer URLs y descargar cada una de manera independiente
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            if [ ! -z "$url" ] && [ "$url" != "null" ]; then
              filename=$(basename "$url")
              echo "Intentando descargar: $filename"
              
              # Intenta descargar. Si da error 404 u otro, continúa con el siguiente sin romper el flujo
              wget --timeout=20 --tries=2 -P pdfs/ "$url" || echo "Aviso: No se pudo obtener $filename de la fuente principal."
            fi
          done
          echo "Proceso de descarga completado."

      - name: Ejecutar script de Python para actualizar JSON
        run: python scripts/update_revistas.py
          
      - name: Verificar cambios reales en Git
        id: verificar
        run: |
          git add pdfs/ data/revistas.json
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "¡Se detectaron cambios en las revistas!"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No hay cambios nuevos hoy."
          fi
          
      - name: Commit y push (Solo si hay cambios)
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Actualización automática: Revistas hípicas - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}