name: Actualizar Resultados Lotería

on:
  schedule:
    - cron: '0 3,15,22 * * *'    # Se ejecuta a las 3:00, 15:00 y 22:00 UTC (Ajustado a husos horarios de sorteos)
  workflow_dispatch:            # Permite que lo actives manualmente haciendo clic en GitHub si lo deseas

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías necesarias
        run: pip install requests beautifulsoup4

      - name: Ejecutar script de actualización inteligente
        run: python scripts/actualizar_loteria.py

      - name: Guardar cambios en el repositorio si aplica
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/tuloteria.json
          # Si el script no modificó el archivo, git diff evitará hacer un commit vacío automáticamente
          git diff --staged --quiet || git commit -m "Actualización automática de resultados [skip ci]"
          git push