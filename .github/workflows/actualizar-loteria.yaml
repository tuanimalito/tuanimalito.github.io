name: Actualizar Resultados Lotería

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4
          
      - name: Ejecutar script
        run: |
          python scripts/actualizar_loteria.py
          
      - name: Verificar cambios
        id: verificar
        run: |
          if [ -n "$(git status --porcelain data/tuloteria.json)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Cambios detectados"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Sin cambios"
          fi
          
      - name: Guardar cambios
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/tuloteria.json
          git commit -m "Actualización resultados - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}