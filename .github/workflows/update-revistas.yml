name: Actualizar Revistas Oasis

on:
  schedule:
    # Programado a las 11, 12 y 13 UTC (Equivale a las 8:00 AM y 9:00 AM hora de Venezuela)
    # Contando con el retraso de GitHub, la ejecución real iniciará en el bloque de la tarde.
    - cron: '0 12,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          
      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          python -m pip install --upgrade pip
          pip install tzdata

      - name: Recrear directorio de almacenamiento
        run: |
          rm -rf pdfs
          mkdir -p pdfs
          touch pdfs/.gitkeep

      - name: Procesar descargas desde Oasis
        run: python scripts/update_revistas.py
          
      - name: Evaluar cambios en la cartelera
        id: verificar
        run: |
          git add pdfs/ data/revistas.json
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Confirmar y publicar cambios
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Sincronización Oasis: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
