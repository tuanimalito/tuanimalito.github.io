name: Actualizar Revistas

on:
  schedule:
    - cron: '0 14,15,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          
      - name: Limpiar y recrear carpeta de PDFs
        run: |
          echo "Limpiando PDFs antiguos del repositorio..."
          rm -rf pdfs
          mkdir -p pdfs
          touch pdfs/.gitkeep

      - name: Descargar PDFs de forma segura
        run: |
          echo "Iniciando descarga de PDFs frescos..."
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            if [ ! -z "$url" ] && [ "$url" != "null" ]; then
              filename=$(basename "$url")
              echo "Intentando obtener hoy: $filename"
              wget --timeout=20 --tries=2 -P pdfs/ "$url" || echo "Aviso: No disponible aún $filename."
            fi
          done

      - name: Ejecutar script de Python para actualizar JSON
        run: python scripts/limpieza_profunda.py
          
      - name: Verificar cambios reales en Git
        id: verificar
        run: |
          git add pdfs/ data/revistas.json
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit y push
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Forzando limpieza profunda del servidor"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
