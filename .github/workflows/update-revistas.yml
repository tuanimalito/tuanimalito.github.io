name: Actualizar Revistas

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Crear carpeta para PDFs si no existe
        run: |
          mkdir -p pdfs
          touch pdfs/.gitkeep
        
      - name: Descargar PDFs desde urls_originales.json
        run: |
          echo "Iniciando descarga de PDFs desde el origen..."
          # Aseguramos que jq lea correctamente las URLs de origen
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            filename=$(basename "$url")
            echo "Descargando: $filename"
            # Agregamos -N para descargar solo si el archivo es más nuevo que el local
            wget -N --quiet --show-progress --timeout=30 --tries=3 -P pdfs/ "$url"
          done
          echo "Descarga completada."

      - name: Ejecutar script de Python para actualizar JSON
        run: python update_revistas.py
          
      - name: Verificar cambios
        id: verificar
        run: |
          # Forzar el rastreo de nuevos archivos en pdfs/ antes de verificar el estatus
          git add -A pdfs/ data/revistas.json
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Se detectaron cambios en los PDFs o en el JSON"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No hay cambios pendientes"
          fi
          
      - name: Commit y push
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Actualización automática de revistas - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
