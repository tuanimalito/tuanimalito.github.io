name: Actualizar Revistas

on:
  schedule:
    # 14,15,16 representan las 14:00, 15:00 y 16:00 UTC
    # Esto equivale a las 10:00 AM, 11:00 AM y 12:00 PM hora de Venezuela (UTC-4)
    - cron: '0 14,15,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          
      # --- PASO CLAVE: Mantener la caché de los PDFs para preservar sus fechas ---
      - name: Preservar caché de PDFs
        uses: actions/cache@v4
        with:
          path: pdfs
          key: pdfs-cache-${{ github.run_id }} # Identificador único por ejecución
          restore-keys: |
            pdfs-cache-
        
      - name: Crear carpeta para PDFs si no existe
        run: |
          mkdir -p pdfs
          touch pdfs/.gitkeep
        
      - name: Descargar solo PDFs nuevos o modificados
        run: |
          echo "Iniciando descarga inteligente de PDFs (Solo nuevos o modificados)..."
          
          # Leer desde urls_originales.json
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            filename=$(basename "$url")
            
            # Usamos -N para verificar la marca de tiempo (Timestamping)
            # Usamos --no-if-modified-since para asegurar compatibilidad con servidores antiguos si fuera necesario
            wget -N --quiet --show-progress --timeout=30 --tries=3 -P pdfs/ "$url"
            
            # Guardamos el código de estado de wget
            status=$?
            if [ $status -eq 0 ]; then
              echo "  -> $filename: Verificado/Descargado correctamente (si era más nuevo)."
            else
              echo "  -> Aviso/Error con $filename (Código wget: $status)"
            fi
          done
          echo "Descarga inteligente completada."

      - name: Ejecutar script de Python para actualizar JSON
        run: python scripts/update_revistas.py
          
      - name: Verificar cambios reales en Git
        id: verificar
        run: |
          # Añadimos todo al índice de Git para comparar
          git add pdfs/ data/revistas.json
          
          # Comprobamos si hay diferencias reales en el contenido
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "¡Se detectaron archivos nuevos o actualizados!"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Todos los archivos son idénticos. No se requiere actualización."
          fi
          
      - name: Commit y push (Solo si hay cambios)
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Actualización automática: Archivos nuevos detectados - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
