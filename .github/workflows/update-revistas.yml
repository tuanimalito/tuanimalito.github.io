name: Actualizar Revistas

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Crear carpeta para PDFs
        run: mkdir -p pdfs
        
      - name: Descargar PDFs desde urls_originales.json
        run: |
          echo "Iniciando descarga de PDFs..."
          
          # Leer URLs desde urls_originales.json (NO desde revistas.json)
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            filename=$(basename "$url")
            echo "Descargando: $filename"
            wget --quiet --show-progress --timeout=30 --tries=3 -O "pdfs/$filename" "$url"
            
            if [ $? -eq 0 ]; then
              echo "  OK: $filename descargado"
            else
              echo "  ERROR: Fallo al descargar $filename"
            fi
          done
          
          echo "Descarga completada"
          
      - name: Actualizar revistas.json con rutas locales
        run: |
          echo "Actualizando revistas.json..."
          
          # Generar nuevo revistas.json con rutas locales (usando urls_originales.json)
          jq '.hipodromos[] | {id, nombre, logo, url_pdf: ("pdfs/" + (.url_pdf | split("/") | last))}' data/urls_originales.json > hipodromos.tmp.json
          
          jq -n --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --slurpfile hipodromos hipodromos.tmp.json '{
            metadata: {
              lastUpdate: $date,
              totalHipodromos: ($hipodromos | length),
              version: "1.0.0"
            },
            hipodromos: $hipodromos
          }' > data/revistas.json
          
          rm hipodromos.tmp.json
          echo "revistas.json actualizado con rutas locales"
          
      - name: Verificar cambios
        id: verificar
        run: |
          if [ -n "$(git status --porcelain pdfs/)" ] || [ -n "$(git status --porcelain data/revistas.json)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Se detectaron cambios"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No hay cambios"
          fi
          
      - name: Commit y push
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add pdfs/ data/revistas.json
          git commit -m "Actualizacion automatica - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
