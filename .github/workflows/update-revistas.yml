name: Actualizar Revistas

on:
  schedule:
    # Se ejecuta a las 10:00 AM, 11:00 AM y 12:00 PM hora de Venezuela (UTC-4)
    - cron: '0 14,15,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          
      - name: Limpiar y recrear carpeta de PDFs
        run: |
          echo "Limpiando PDFs antiguos del repositorio para evitar duplicados..."
          rm -rf pdfs
          mkdir -p pdfs
          touch pdfs/.gitkeep

      - name: Descargar PDFs de la Fuente Principal
        run: |
          echo "Intentando obtener PDFs de la fuente primaria..."
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            if [ ! -z "$url" ] && [ "$url" != "null" ]; then
              filename=$(basename "$url")
              # Intenta descargar de PollaMacaco. Si falla, continúa en silencio.
              wget --timeout=15 --tries=1 -P pdfs/ "$url" || echo "Aviso: No disponible en fuente primaria: $filename."
            fi
          done

      - name: Ejecutar script de Python con Respaldo Inteligente
        run: python scripts/update_revistas.py
          
      - name: Verificar cambios reales en Git
        id: verificar
        run: |
          git add pdfs/ data/revistas.json
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "¡Nuevas revistas detectadas hoy!"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No hay actualizaciones nuevas respecto a la hora anterior."
          fi
          
      - name: Commit y push de resultados
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Actualización automática: Sincronización de revistas - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
