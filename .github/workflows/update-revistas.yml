name: Actualizar Revistas

on:
  schedule:
    # Se ejecuta a las 10:00 AM, 11:00 AM y 12:00 PM hora de Venezuela (UTC-4)
    - cron: '0 14,15,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-revistas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          
      - name: Limpiar y recrear carpeta de PDFs
        run: |
          echo "Limpiando PDFs antiguos del repositorio..."
          # Borramos la carpeta por completo para eliminar rastros viejos
          rm -rf pdfs
          mkdir -p pdfs
          # Dejamos el archivo oculto para que Git no borre la carpeta vacía
          touch pdfs/.gitkeep

      - name: Descargar PDFs de forma segura
        run: |
          echo "Iniciando descarga de PDFs frescos desde la fuente..."
          
          # Leer URLs desde data/urls_originales.json y descargar cada una
          jq -r '.hipodromos[].url_pdf' data/urls_originales.json | while read url; do
            if [ ! -z "$url" ] && [ "$url" != "null" ]; then
              filename=$(basename "$url")
              echo "Intentando obtener hoy: $filename"
              
              # Intenta descargar. Si da error 404 (no ha salido la revista de hoy), pasa al siguiente sin detener el flujo
              wget --timeout=20 --tries=2 -P pdfs/ "$url" || echo "Aviso: El servidor fuente no tiene disponible aún $filename."
            fi
          done
          echo "Proceso de descarga completado."

      - name: Ejecutar script de Python para actualizar JSON
        run: python scripts/update_revistas.py
          
      - name: Verificar cambios reales en Git
        id: verificar
        run: |
          # Añadimos los cambios al índice de Git
          git add pdfs/ data/revistas.json
          
          # Si hay algún cambio en el JSON o en los archivos físicos, procedemos
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "¡Se detectaron actualizaciones en las revistas de hoy!"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No hay revistas nuevas en la fuente respecto a la última revisión."
          fi
          
      - name: Commit y push (Solo si hay cambios reales)
        if: steps.verificar.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "Actualización automática: Revistas del día - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
