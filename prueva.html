<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>Datos de Animalitos Hoy | TuAnimalito</title>
    
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/stylesheets/styles.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4a69bd;
            --primary-dark: #2c3e50;
            --white: #ffffff;
        }
        
        body { font-family: 'Poppins', sans-serif; background: #f5f7fa; }

        /* Estilos de la sección de videos */
        .videos-section { background: linear-gradient(135deg, #667eea 0, #764ba2 100%); padding: 60px 0; }
        
        .video-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 15px;
            overflow: hidden; /* CRÍTICO: Evita barras de desplazamiento */
            cursor: pointer;
            background: #000;
            margin-bottom: 15px;
        }

        .thumbnail-img { width: 100%; height: 100%; object-fit: cover; }

        /* Contenedor del video una vez activado */
        .youtube-embed-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #000;
        }

        .youtube-embed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .play-button-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s;
        }
        .thumbnail-container:hover .play-button-overlay { opacity: 1; }
        
        .play-icon {
            width: 50px; height: 50px;
            background: #FF0000;
            border-radius: 50%;
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <main id="main">
        <section class="videos-section">
            <div class="container">
                <div class="row gy-4">
                    
                    <div class="col-lg-4 col-md-6">
                        <div class="video-card" id="video-card-1">
                            <div class="thumbnail-container" onclick="loadYouTubeVideo('N28B6IwVc24', 'video-card-1')">
                                <img src="assets/images/blog/mini1.png" class="thumbnail-img">
                                <div class="play-button-overlay"><div class="play-icon">▶</div></div>
                            </div>
                            <h3>Aprende por qué repiten tanto</h3>
                            <p>Estrategias avanzadas para tus jugadas.</p>
                        </div>
                    </div>

                    <div class="col-lg-4 col-md-6">
                        <div class="video-card" id="video-card-2">
                            <div class="thumbnail-container" onclick="loadYouTubeVideo('vIeULHiR2Tc', 'video-card-2')">
                                <img src="assets/images/blog/mini2.png" class="thumbnail-img">
                                <div class="play-button-overlay"><div class="play-icon">▶</div></div>
                            </div>
                            <h3>Cómo hacer Tripletas</h3>
                            <p>Mejora tus probabilidades de ganar.</p>
                        </div>
                    </div>

                    <div class="col-lg-4 col-md-6">
                        <div class="video-card" id="video-card-3">
                            <div class="thumbnail-container" onclick="loadYouTubeVideo('CieyyhPgOpA', 'video-card-3')">
                                <img src="assets/images/blog/mini3.png" class="thumbnail-img">
                                <div class="play-button-overlay"><div class="play-icon">▶</div></div>
                            </div>
                            <h3>Fijos para Loto Activo</h3>
                            <p>Los datos más calientes del día.</p>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script>
        window.loadYouTubeVideo = function(videoId, containerId) {
            const card = document.getElementById(containerId);
            const thumbContainer = card.querySelector('.thumbnail-container');
            
            let cleanId = videoId;
            if (videoId.includes('youtu.be')) {
                cleanId = videoId.split('youtu.be/')[1].split(/[?#]/)[0];
            } else if (videoId.includes('youtube.com')) {
                cleanId = videoId.split('v=')[1].split('&')[0];
            }

            // REEMPLAZO INTERNO: Mantiene el tamaño de la miniatura
            thumbContainer.innerHTML = `
                <div class="youtube-embed-container">
                    <iframe 
                        src="https://www.youtube.com/embed/${cleanId}?autoplay=1&rel=0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen>
                    </iframe>
                </div>`;
        };
    </script>
</body>
</html>
