<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>Datos de Animalitos Hoy | TuAnimalito</title>
    
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/stylesheets/styles.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4a69bd;
            --primary-dark: #2c3e50;
            --white: #ffffff;
        }

        body { font-family: 'Poppins', sans-serif; background: #f5f7fa; }

        /* SECCIÓN DE VIDEOS: CORRECCIÓN DE DISEÑO */
        .videos-section {
            background: linear-gradient(135deg, #667eea 0, #764ba2 100%);
            padding: 60px 0;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        /* Contenedor que mantiene la proporción 16:9 y evita scrolls */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .video-wrapper img, .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 2;
        }

        .play-overlay:hover { background: rgba(0,0,0,0.1); }

        .play-button {
            width: 60px; height: 60px;
            background: #FF0000;
            border-radius: 50%;
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(255,0,0,0.5);
        }

        #header { background: var(--primary-dark); padding: 15px 0; color: white; }
    </style>
</head>
<body>

    <header id="header">
        <div class="container d-flex justify-content-between align-items-center">
            <h1>🚨 Tu.Animalito💲</h1>
            <nav>Inicio</nav>
        </div>
    </header>

    <main id="main">
        <section class="videos-section">
            <div class="container">
                <div class="row">
                    
                    <div class="col-lg-4 col-md-6">
                        <div class="video-card">
                            <div class="video-wrapper" id="container-1">
                                <div class="play-overlay" onclick="startVideo('N28B6IwVc24', 'container-1')">
                                    <div class="play-button">▶</div>
                                </div>
                                <img src="assets/images/blog/mini1.png" alt="Miniatura">
                            </div>
                            <h3 class="mt-3">¿Por qué repiten tanto?</h3>
                            <p>Estrategias avanzadas de repetición.</p>
                        </div>
                    </div>

                    <div class="col-lg-4 col-md-6">
                        <div class="video-card">
                            <div class="video-wrapper" id="container-2">
                                <div class="play-overlay" onclick="startVideo('vIeULHiR2Tc', 'container-2')">
                                    <div class="play-button">▶</div>
                                </div>
                                <img src="assets/images/blog/mini2.png" alt="Miniatura">
                            </div>
                            <h3 class="mt-3">Truco de las Tripletas</h3>
                            <p>Cómo combinar para ganar más.</p>
                        </div>
                    </div>

                    <div class="col-lg-4 col-md-6">
                        <div class="video-card">
                            <div class="video-wrapper" id="container-3">
                                <div class="play-overlay" onclick="startVideo('CieyyhPgOpA', 'container-3')">
                                    <div class="play-button">▶</div>
                                </div>
                                <img src="assets/images/blog/mini3.png" alt="Miniatura">
                            </div>
                            <h3 class="mt-3">Fijos para Loto Activo</h3>
                            <p>Datos calientes del día.</p>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <script>
        /**
         * Función definitiva para cargar videos
         * Evita el error de "Configuración del reproductor" al usar parámetros simplificados
         */
        function startVideo(videoId, containerId) {
            const container = document.getElementById(containerId);
            
            // Parámetros de YouTube: 
            // autoplay=1 (inicia solo), rel=0 (no muestra videos sugeridos ajenos)
            const videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
            
            container.innerHTML = `
                <iframe 
                    src="${videoUrl}" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            `;
        }
    </script>

</body>
</html>
