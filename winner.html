<!DOCTYPE html>
<html lang="es">

<head>
<meta name="content-language" content="es-US">

<meta charset="utf-8">
<title>Retrospectos Hípicos: Winner, winner choice, Carreras Americanas, retrospecto gulfstream park, Revistas Hípicas.</title>
<meta name="keywords" content="revista americana, gaceta americana, retrospecto gulfstream park, gaceta de gulfstream park hoy">
<meta name="description" content="Acceda a las revistas hípicas más completas de los principales hipódromos de Estados Unidos. Información profesional para aficionados y apostadores.">
<meta content="width=device-width, initial-scale=1.0\" name=\"viewport\">
<link rel="canonical" href="https://tuanimalito.github.io/winner.html" />

<link href="img/favicon.ico" rel="icon">

<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        --bg-dark: #0f0f1a;
        --card-bg: #16162a;
        --text-main: #ffffff;
        --text-muted: #a0a0b8;
        --accent-gold: #ffcc00;
        --accent-green: #2ecc71;
        --accent-red: #e74c3c;
        --btn-hover: #e6b800;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-main);
        padding: 40px 20px;
        min-height: 100vh;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .header-section {
        text-align: center;
        margin-bottom: 50px;
    }

    .header-section h1 {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .header-section h1 span {
        color: var(--accent-gold);
    }

    .header-section p {
        color: var(--text-muted);
        font-size: 1.1rem;
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, min-max(260px, 1fr));
        gap: 30px;
        padding: 10px;
    }

    @media (min-width: 600px) {
        .grid-container {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (min-width: 900px) {
        .grid-container {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (min-width: 1200px) {
        .grid-container {
            grid-template-columns: repeat(4, 1fr);
        }
    }

    .generator-card {
        background-color: var(--card-bg);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
    }

    .generator-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 32px rgba(255, 204, 0, 0.1);
    }

    /* --- ETIQUETAS DE ESTADO (ESQUINAS) --- */
    .status-badge-corner {
        position: absolute;
        top: 12px;
        left: 12px;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        z-index: 5;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .status-active {
        background-color: var(--accent-green);
        color: white;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .status-inactive {
        background-color: #3a3a50;
        color: #b0b0c5;
        border: 1px solid rgba(0,0,0,0.2);
    }

    .generator-img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: filter 0.3s ease;
    }

    .generator-body {
        padding: 20px;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .generator-category {
        font-size: 0.75rem;
        color: var(--accent-gold);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 8px;
    }

    .generator-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 20px;
        line-height: 1.4;
    }

    .btn-carousel {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-family: 'Poppins', sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: auto;
        text-align: center;
        text-decoration: none;
        display: inline-block;
    }

    .btn-ver-winner {
        background: linear-gradient(135deg, var(--accent-gold) 0%, #ffaa00 100%);
        color: #000000;
        box-shadow: 0 4px 12px rgba(255, 204, 0, 0.2);
    }

    .btn-ver-winner:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 16px rgba(255, 204, 0, 0.3);
    }

    .btn-disabled {
        background-color: #222236 !important;
        color: #555570 !important;
        border: 1px solid #2d2d44 !important;
        cursor: not-allowed !important;
        box-shadow: none !important;
        transform: none !important;
    }

    .generator-rating {
        margin-top: 15px;
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .generator-rating i {
        color: var(--accent-gold);
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
</style>
</head>

<body>

<div class="container">
    <div class="header-section">
        <h1>Revistas <span>Americanas</span></h1>
        <p>Selecciona un hipódromo para ver los retrospectos actualizados</p>
    </div>

    <div class="grid-container" id="revistas-grid">
        </div>
</div>

<script>
    async function cargarTuWinnerRevistas() {
        const grid = document.getElementById('revistas-grid');
        try {
            // Añadir parámetro único para saltar la caché del navegador
            const respuesta = await fetch(`data/revistas.json?t=${new Date().getTime()}`);
            if (!respuesta.ok) throw new Error('No se pudo cargar el archivo de datos');
            
            const data = await respuesta.load ? await respuesta.load() : await respuesta.json();
            grid.innerHTML = ''; 

            if (!data.hipodromos || data.hipodromos.length === 0) {
                grid.innerHTML = '<div class="text-center" style="grid-column: 1/-1; color: var(--text-muted);">No hay hipódromos configurados actualmente.</div>';
                return;
            }

            data.hipodromos.forEach(hipodromo => {
                const urlPdf = hipodromo.revistas ? hipodromo.revistas.espanol : '#';
                
                let badgeHTML = '';
                let botonHTML = '';
                let imgEstilo = '';
                let tituloEstilo = '';

                // Si está activo, renderizamos verde, si no, deshabilitado y gris
                if (hipodromo.activo) {
                    badgeHTML = `<span class="status-badge-corner status-active"><i class="fas fa-circle text-white mr-1 small animate-pulse" style="font-size:8px; vertical-align:middle;"></i> Activo</span>`;
                    botonHTML = `<button class="btn-carousel btn-ver-winner" onclick="window.open('${urlPdf}', '_blank')">Ver winner</button>`;
                } else {
                    badgeHTML = `<span class="status-badge-corner status-inactive">No Disp.</span>`;
                    botonHTML = `<button class="btn-carousel btn-disabled" disabled>No disponible</button>`;
                    imgEstilo = 'filter: grayscale(0.8) brightness(0.4);';
                    tituloEstilo = 'color: var(--text-muted);';
                }

                const card = document.createElement('div');
                card.className = 'generator-card';
                card.innerHTML = `
                    ${badgeHTML}
                    <img class="generator-img" src="${hipodromo.logo}" alt="${hipodromo.nombre}" style="${imgEstilo}">
                    <div class="generator-body">
                        <div class="generator-category">TUWINNER</div>
                        <h4 class="generator-title" style="${tituloEstilo}">${hipodromo.nombre}</h4>
                        ${botonHTML}
                        <div class="generator-rating">
                            <i class="fas fa-star"></i> 4.8 (Estable)
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (error) {
            console.error('Error:', error);
            grid.innerHTML = '<div class="text-center" style="grid-column: 1/-1; color: #e74c3c;">Error al cargar los retrospectos dinámicos. Por favor reintente.</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', cargarTuWinnerRevistas);

    // ============================================
    // CAPA DE SEGURIDAD - Protección básica
    // ============================================
    (function() {
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.key === 'u') || 
                (e.ctrlKey && e.key === 's') || 
                (e.metaKey && e.key === 's')) {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    })();
</script>
</body>
</html>
