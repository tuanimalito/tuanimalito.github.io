    <script>
        // ===== FUNCIÓN DE FECHA Y HORA AUTOMÁTICA =====
        function actualizarFechaHora() {
            const ahora = new Date();
            const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
            const fechaFormateada = ahora.toLocaleDateString('es-ES', opcionesFecha);
            const horas = String(ahora.getHours()).padStart(2, '0');
            const minutos = String(ahora.getMinutes()).padStart(2, '0');
            const segundos = String(ahora.getSeconds()).padStart(2, '0');
            const horaFormateada = `${horas}:${minutos}:${segundos}`;
            
            const fechaElemento = document.getElementById('fechaActual');
            const horaElemento = document.getElementById('horaActual');
            
            if (fechaElemento) fechaElemento.innerText = fechaFormateada;
            if (horaElemento) horaElemento.innerText = horaFormateada;
        }
        
        setInterval(actualizarFechaHora, 1000);
        
        // ===== SEGURIDAD =====
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73) ||
                    (e.ctrlKey && e.shiftKey && e.keyCode === 74) || (e.ctrlKey && e.keyCode === 85)) {
                    e.preventDefault();
                }
            });
            (function detectDevTools() {
                const element = new Image();
                Object.defineProperty(element, 'id', {
                    get: function() { console.clear(); }
                });
                console.log(element);
            })();
        })();
        
        document.addEventListener('DOMContentLoaded', function() {
            actualizarFechaHora();
            
            const resultadoContenedor = document.getElementById('resultado-contenido');
            const statusBar = document.getElementById('statusBar');
            // Ruta de imágenes para Lotto Activo
            const baseImagePath = 'animalitos/animalitos_loto/';
            
            // Ruta del JSON
            const JSON_URL = 'data/lotto.json';
            
            function formatNumber(num) {
                if (num === 0 || num === '00') return '00';
                return num.toString();
            }
            
            function normalizarNumero(valor) {
                if (valor === '00' || valor === 0) return 0;
                return parseInt(valor);
            }
            
            // Diccionario de animales para Lotto Activo (0-36)
            function obtenerAnimal(num) {
                const animales = {
                    0: 'delfín', 1: 'carnero', 2: 'toro', 3: 'ciempiés', 4: 'alacrán',
                    5: 'león', 6: 'rana', 7: 'perico', 8: 'ratón', 9: 'águila',
                    10: 'tigre', 11: 'gato', 12: 'caballo', 13: 'mono', 14: 'paloma',
                    15: 'zorro', 16: 'oso', 17: 'pavo', 18: 'burro', 19: 'chivo',
                    20: 'cochino', 21: 'gallo', 22: 'camello', 23: 'cebra', 24: 'iguana',
                    25: 'gallina', 26: 'vaca', 27: 'perro', 28: 'zamuro', 29: 'elefante',
                    30: 'caimán', 31: 'lapa', 32: 'ardilla', 33: 'pescado', 34: 'venado',
                    35: 'jirafa', 36: 'culebra'
                };
                return animales[num] || 'desconocido';
            }
            
            // Bases para Tripletas: ≤19 = +1,+2,+3 | ≥20 = -1,-2,-3
            function calcularSuperFijos(seed) {
                let resultados = [seed];
                
                if (seed <= 19) {
                    let current = seed;
                    const incrementos = [1, 2, 3];
                    for (let i = 0; i < incrementos.length; i++) {
                        const suma = current + incrementos[i];
                        if (suma <= 36) {
                            resultados.push(suma);
                            current = suma;
                        }
                    }
                } else {
                    let current = seed;
                    const decrementos = [1, 2, 3];
                    for (let i = 0; i < decrementos.length; i++) {
                        const resta = current - decrementos[i];
                        if (resta >= 0) {
                            resultados.push(resta);
                            current = resta;
                        }
                    }
                }
                
                return [...new Set(resultados)];
            }
            
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }
            
            function mostrarError(mensaje) {
                resultadoContenedor.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        ${mensaje}
                    </div>
                `;
                statusBar.innerHTML = '❌ Error al cargar los datos';
            }
            
            async function cargarNumeroBase() {
                try {
                    statusBar.innerHTML = '<span class="loading-spinner"></span> Conectando con la base de datos...';
                    
                    const response = await fetch(JSON_URL + '?t=' + Date.now());
                    if (!response.ok) throw new Error('No se pudo cargar los datos');
                    
                    const data = await response.json();
                    
                    if (!data.resultados || data.resultados.length === 0) {
                        throw new Error('no contiene resultados');
                    }
                    
                    const ultimoDia = data.resultados[data.resultados.length - 1];
                    
                    if (!ultimoDia || ultimoDia.length === 0) {
                        throw new Error('El último día no tiene resultados');
                    }
                    
                    let numeroBaseRaw = ultimoDia[ultimoDia.length - 1];
                    let numeroBase = normalizarNumero(numeroBaseRaw);
                    
                    statusBar.innerHTML = `✅ Dr.animalitos: ${formatNumber(numeroBase)} - ${obtenerAnimal(numeroBase)}`;
                    
                    return { numeroBase, numeroBaseRaw };
                    
                } catch (error) {
                    console.error('Error:', error);
                    mostrarError(`No se pudieron cargar los datos: ${error.message}`);
                    throw error;
                }
            }
            
            function mostrarSuperFijos(numeroBase, numeroBaseRaw) {
                const resultados = calcularSuperFijos(numeroBase);
                
                if (!resultados || resultados.length === 0) {
                    mostrarError('No se pudieron generar las Bases para Tripletas');
                    return;
                }
                
                const shuffled = shuffleArray([...resultados]);
                
                let html = '<div class="numeros-grid">';
                shuffled.forEach(num => {
                    const displayNum = formatNumber(num);
                    const nombreAnimal = obtenerAnimal(num);
                    const imageUrl = `${baseImagePath}${displayNum}.png`;
                    
                    html += `
                        <div class="numero-card">
                            <div class="numero">${displayNum}</div>
                            <img src="${imageUrl}" alt="${nombreAnimal}" 
                                 onerror="this.src='animalitos/animalitos_loto/00.png'">
                            <div class="animal">${nombreAnimal}</div>
                        </div>
                    `;
                });
                html += '</div>';
                
                const baseInfo = document.createElement('div');
                baseInfo.style.cssText = 'margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 10px; text-align: center; font-size: 0.85rem; color: #555;';
                baseInfo.innerHTML = `<i class="fas fa-chart-line"></i> El mas Caliente: <strong>${formatNumber(numeroBaseRaw)}</strong> (${obtenerAnimal(numeroBase)})`;
                
                resultadoContenedor.innerHTML = html;
                resultadoContenedor.appendChild(baseInfo);
            }
            
            async function inicializar() {
                try {
                    const { numeroBase, numeroBaseRaw } = await cargarNumeroBase();
                    mostrarSuperFijos(numeroBase, numeroBaseRaw);
                } catch (error) {
                    console.error('Inicialización fallida:', error);
                }
            }
            
            inicializar();
        });
    </script>
