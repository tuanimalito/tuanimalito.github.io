    <title>Datos de Animalitos Hoy | TuAnimalito</title>
    
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #1a1a1a;
            --gradient-bg: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; }

        #header { background: var(--primary-dark); padding: 15px 0; color: white; text-align: center; }
        .logo h1 { font-size: 24px; margin: 0; font-weight: 700; color: white; }

        /* SECCIÓN DE VIDEOS RECONSTRUIDA */
        .video-gallery-section {
            background: var(--gradient-bg);
            padding: 60px 0;
            color: white;
        }

        .video-card-final {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        /* EL TRUCO QUE USAN LAS WEBS PROFESIONALES */
        /* Esto elimina el error de scroll grises y el video cortado */
        .video-responsive-container {
            position: relative;
            width: 100% !important;
            padding-bottom: 56.25% !important; /* Mantiene 16:9 exacto */
            height: 0 !important;
            background: #000;
            overflow: hidden !important;
            line-height: 0; /* Mata cualquier espacio fantasma inferior */
        }

        .video-responsive-container iframe {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            border: 0 !important;
        }

        .video-info {
            padding: 20px;
            color: #333;
        }
        .video-info h4 { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; }
        .video-info p { font-size: 0.85rem; color: #666; margin: 0; }

        footer { background: var(--primary-dark); color: white; padding: 30px 0; text-align: center; }
    </style>
</head>
<body>

    <header id="header">
        <div class="container">
            <div class="logo"><h1>🚨 Tu<span>.</span>Animalito💲</h1></div>
        </div>
    </header>

    <main>
        <section class="video-gallery-section">
            <div class="container">
                <div class="text-center mb-5">
                    <h2 style="font-weight: 700;">🎥 Tutoriales Estratégicos</h2>
                    <p>Contenido actualizado para ganar en los sorteos</p>
                </div>

                <div class="row justify-content-center">
                    
                    <div class="col-lg-6">
                        <div class="video-card-final">
                            <div class="video-responsive-container">
                                <iframe 
                                    src="https://www.youtube.com/embed/N28B6IwVc24?modestbranding=1&rel=0&iv_load_policy=3" 
                                    title="Repeticiones"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                                </iframe>
                            </div>
                            <div class="video-info">
                                <h4>¿Por qué repiten tanto?</h4>
                                <p>Descubre la lógica detrás de los resultados frecuentes.</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="video-card-final">
                            <div class="video-responsive-container">
                                <iframe 
                                    src="https://www.youtube.com/embed/vIeULHiR2Tc?modestbranding=1&rel=0&iv_load_policy=3" 
                                    title="Tripletas"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                                </iframe>
                            </div>
                            <div class="video-info">
                                <h4>Truco de las Tripletas</h4>
                                <p>Cómo armar combinaciones efectivas para hoy.</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TuAnimalito - Todos los derechos reservados</p>
        </div>
    </footer>

</body>
</html>
